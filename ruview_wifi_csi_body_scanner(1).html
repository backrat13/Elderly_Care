
<h2 class="sr-only">RuView live WiFi-CSI body scanner — 19 body zones updated at 60 Hz using a Rician fading signal model with simulated breathing at 15 breaths per minute</h2>

<div style="display:flex;gap:20px;padding:8px 0;align-items:flex-start">

  <div style="flex-shrink:0;width:200px">
    <div style="font:500 11px var(--font-mono);color:var(--color-text-secondary);margin-bottom:6px;letter-spacing:.05em">body map — click a zone</div>
    <svg id="rv-svg" viewBox="0 0 200 320" width="200" height="320" style="display:block"></svg>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;background:#1D9E75;border-radius:2px;flex-shrink:0"></span>strong</span>
      <span style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;background:#639922;border-radius:2px;flex-shrink:0"></span>good</span>
      <span style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;background:#BA7517;border-radius:2px;flex-shrink:0"></span>medium</span>
      <span style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;background:#E24B4A;border-radius:2px;flex-shrink:0"></span>weak</span>
    </div>
  </div>

  <div style="flex:1;min-width:0">
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px">
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px">
        <div style="font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono);margin-bottom:5px">breath (chest CSI)</div>
        <div style="height:4px;background:var(--color-background-tertiary);border-radius:2px;overflow:hidden">
          <div id="rv-breath" style="height:100%;width:0%;background:#1D9E75;border-radius:2px"></div>
        </div>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px">
        <div style="font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono);margin-bottom:2px">avg rssi</div>
        <div id="rv-avgrssi" style="font:500 14px var(--font-mono);color:var(--color-text-primary)">—</div>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px">
        <div style="font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono);margin-bottom:2px">scan tick</div>
        <div id="rv-tick" style="font:500 14px var(--font-mono);color:var(--color-text-primary)">0</div>
      </div>
    </div>

    <div id="rv-panel" style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;min-height:230px"></div>
  </div>
</div>

<script>
(function(){
var ZONES=[
  {n:'skull',          l:'Skull',           s:'e',cx:100,cy:28,rx:24,ry:24,         br:-55,ba:0.5},
  {n:'neck',           l:'Neck',            s:'r',x:90, y:53, w:20,h:14,rx:4,       br:-57,ba:1.0},
  {n:'left_shoulder',  l:'Left shoulder',   s:'r',x:46, y:67, w:27,h:22,rx:8,       br:-60,ba:1.5},
  {n:'chest',          l:'Chest',           s:'r',x:73, y:67, w:54,h:50,rx:5,       br:-52,ba:8.0},
  {n:'right_shoulder', l:'Right shoulder',  s:'r',x:127,y:67, w:27,h:22,rx:8,       br:-60,ba:1.5},
  {n:'left_arm',       l:'Left arm',        s:'r',x:43, y:90, w:20,h:42,rx:7,       br:-63,ba:0.5},
  {n:'abdomen',        l:'Abdomen',         s:'r',x:73, y:117,w:54,h:36,rx:4,       br:-54,ba:5.0},
  {n:'right_arm',      l:'Right arm',       s:'r',x:137,y:90, w:20,h:42,rx:7,       br:-63,ba:0.5},
  {n:'left_forearm',   l:'Left forearm',    s:'r',x:39, y:132,w:18,h:34,rx:6,       br:-65,ba:0.3},
  {n:'pelvis',         l:'Pelvis',          s:'r',x:72, y:153,w:56,h:26,rx:7,       br:-58,ba:2.0},
  {n:'right_forearm',  l:'Right forearm',   s:'r',x:143,y:132,w:18,h:34,rx:6,       br:-65,ba:0.3},
  {n:'left_thigh',     l:'Left thigh',      s:'r',x:72, y:179,w:26,h:50,rx:6,       br:-67,ba:0.2},
  {n:'right_thigh',    l:'Right thigh',     s:'r',x:102,y:179,w:26,h:50,rx:6,       br:-67,ba:0.2},
  {n:'left_knee',      l:'Left knee',       s:'r',x:73, y:229,w:23,h:18,rx:6,       br:-70,ba:0.1},
  {n:'right_knee',     l:'Right knee',      s:'r',x:102,y:229,w:23,h:18,rx:6,       br:-70,ba:0.1},
  {n:'left_shin',      l:'Left shin',       s:'r',x:74, y:247,w:21,h:44,rx:5,       br:-72,ba:0.1},
  {n:'right_shin',     l:'Right shin',      s:'r',x:103,y:247,w:21,h:44,rx:5,       br:-72,ba:0.1},
  {n:'left_foot',      l:'Left foot',       s:'r',x:67, y:291,w:28,h:16,rx:5,       br:-75,ba:0.0},
  {n:'right_foot',     l:'Right foot',      s:'r',x:100,y:291,w:28,h:16,rx:5,       br:-75,ba:0.0}
];

var NS='http://www.w3.org/2000/svg';
var svg=document.getElementById('rv-svg');
var panel=document.getElementById('rv-panel');
var breathEl=document.getElementById('rv-breath');
var avgEl=document.getElementById('rv-avgrssi');
var tickEl=document.getElementById('rv-tick');

function rssiColor(r){return r>-55?'#1D9E75':r>-62?'#639922':r>-68?'#BA7517':'#E24B4A';}
function rssiGrade(r){return r>-55?'strong':r>-62?'good':r>-68?'medium':'weak';}

function sample(z,t,bp){
  var breath=z.ba*Math.sin(bp*2*Math.PI);
  var rssi=z.br+breath+(Math.random()-0.5)*4;
  var dist=(-z.br-50)/25;
  var phase=(t*0.2+dist*Math.PI+(Math.random()-0.5)*0.2)%(2*Math.PI);
  var K=3,los=Math.sqrt(K/(K+1));
  var csi=los+Math.random()*Math.sqrt(1/(K+1));
  var motion=Math.min(Math.random()*Math.abs(breath)/10+Math.abs(breath)*0.05,1);
  return {rssi:rssi,phase:phase,csi:csi,motion:motion};
}

var elMap={};
var CHEST_H=50,CHEST_Y=67,ABD_H=36,ABD_Y=117;

ZONES.forEach(function(z){
  var el=document.createElementNS(NS,z.s==='e'?'ellipse':'rect');
  if(z.s==='e'){el.setAttribute('cx',z.cx);el.setAttribute('cy',z.cy);el.setAttribute('rx',z.rx);el.setAttribute('ry',z.ry);}
  else{el.setAttribute('x',z.x);el.setAttribute('y',z.y);el.setAttribute('width',z.w);el.setAttribute('height',z.h);if(z.rx)el.setAttribute('rx',z.rx);}
  el.setAttribute('fill','#88888880');el.setAttribute('stroke','#88888840');el.setAttribute('stroke-width','0.8');
  el.setAttribute('data-zone',z.n);
  el.style.cursor='pointer';
  el.style.transition='fill .4s,stroke .4s,stroke-width .12s,fill-opacity .12s';
  svg.appendChild(el);
  elMap[z.n]=el;
});

var selected=null;
var sigs={};
var history={};
ZONES.forEach(function(z){history[z.n]=[];});
var HLEN=80,tick=0,t0=performance.now(),frameCount=0;

svg.addEventListener('click',function(e){
  var zone=e.target.getAttribute('data-zone');
  if(zone){selected=selected===zone?null:zone;renderPanel();}
});

panel.addEventListener('click',function(e){
  if(e.target.closest('[data-back]')){selected=null;renderPanel();return;}
  var zr=e.target.closest('[data-zone]');
  if(zr){selected=zr.getAttribute('data-zone');renderPanel();}
});

function tRow(k,v,c){
  return '<tr><td style="color:var(--color-text-secondary);padding:3px 0;padding-right:16px;font-family:var(--font-mono);font-size:12px;white-space:nowrap">'+k+'</td>'
    +'<td style="font-family:var(--font-mono);font-size:12px;color:'+(c||'var(--color-text-primary)')+'">'+v+'</td></tr>';
}

function waveformSVG(zn){
  var h=history[zn]||[];if(h.length<2)return '';
  var c=rssiColor(h[h.length-1]);
  var pts=h.map(function(r,i){
    return ((i/(HLEN-1))*198).toFixed(1)+','+(Math.max(0,Math.min(38,(-r-50)/30*38))).toFixed(1);
  }).join(' ');
  return '<div style="margin-top:10px;border-top:0.5px solid var(--color-border-tertiary);padding-top:6px">'
    +'<div style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-bottom:4px">rssi history</div>'
    +'<svg viewBox="0 0 200 40" width="100%" height="36" preserveAspectRatio="none" style="display:block">'
    +'<polyline points="'+pts+'" fill="none" stroke="'+c+'" stroke-width="1.5" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'
    +'</svg></div>';
}

function renderPanel(){
  if(!selected){
    var rows=ZONES.map(function(z){
      var sig=sigs[z.n];
      var c=sig?rssiColor(sig.rssi):'var(--color-text-tertiary)';
      var bar=sig?Math.max(3,Math.round((sig.rssi+80)/30*100)):0;
      return '<div data-zone="'+z.n+'" style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer">'
        +'<div style="width:90px;font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono);flex-shrink:0">'+z.l+'</div>'
        +'<div style="flex:1;height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+bar+'%;background:'+c+'"></div></div>'
        +'<div style="width:64px;text-align:right;font-size:11px;font-family:var(--font-mono);color:'+c+'">'+(sig?sig.rssi.toFixed(1)+' dBm':'—')+'</div>'
        +'</div>';
    }).join('');
    panel.innerHTML='<div style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-bottom:8px">all zones — click to inspect</div>'+rows;
  } else {
    var z=ZONES.find(function(z){return z.n===selected;});
    var sig=sigs[selected];
    if(!z||!sig)return;
    var c=rssiColor(sig.rssi);
    var bw=Math.max(3,Math.round((sig.rssi+80)/30*100));
    panel.innerHTML=
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<div style="font:500 14px var(--font-mono);color:var(--color-text-primary)">'+z.l+'</div>'
      +'<button data-back="1" style="font-size:11px;font-family:var(--font-mono);background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:2px 8px;cursor:pointer;color:var(--color-text-secondary)">all zones</button>'
      +'</div>'
      +'<div style="height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-bottom:12px">'
      +'<div style="height:100%;width:'+bw+'%;background:'+c+';border-radius:3px"></div></div>'
      +'<table style="width:100%;border-collapse:collapse">'
      +tRow('rssi',sig.rssi.toFixed(2)+' dBm',c)
      +tRow('grade',rssiGrade(sig.rssi),c)
      +tRow('phase shift',sig.phase.toFixed(4)+' rad',null)
      +tRow('csi magnitude',sig.csi.toFixed(4),null)
      +tRow('motion score',(sig.motion*100).toFixed(1)+'%',null)
      +tRow('baseline rssi',z.br+' dBm',null)
      +tRow('breath amplitude','±'+z.ba+' dBm',null)
      +'</table>'
      +waveformSVG(selected);
  }
}
renderPanel();

function animate(){
  var t=(performance.now()-t0)/1000;
  var bp=(t*0.25)%1;
  var bsin=Math.sin(bp*2*Math.PI);

  var ns={};
  ZONES.forEach(function(z){
    var s=sample(z,t,bp);ns[z.n]=s;
    history[z.n].push(s.rssi);
    if(history[z.n].length>HLEN)history[z.n].shift();
  });
  sigs=ns;

  ZONES.forEach(function(z){
    var el=elMap[z.n],sig=sigs[z.n],c=rssiColor(sig.rssi);
    el.setAttribute('fill',c);
    el.setAttribute('fill-opacity',selected===z.n?'0.85':'0.55');
    el.setAttribute('stroke',c);
    el.setAttribute('stroke-width',selected===z.n?'2':'0.8');
    if(z.n==='chest'){
      var ex=1+bsin*0.055;
      el.setAttribute('height',(CHEST_H*ex).toFixed(1));
      el.setAttribute('y',(CHEST_Y-CHEST_H*(ex-1)/2).toFixed(1));
    }
    if(z.n==='abdomen'){
      var ex2=1+bsin*0.032;
      el.setAttribute('height',(ABD_H*ex2).toFixed(1));
      el.setAttribute('y',(ABD_Y-ABD_H*(ex2-1)/2).toFixed(1));
    }
  });

  var chest=sigs['chest'];
  breathEl.style.width=Math.round(chest.motion*100)+'%';
  breathEl.style.background=rssiColor(chest.rssi);
  var avg=ZONES.reduce(function(s,z){return s+sigs[z.n].rssi;},0)/ZONES.length;
  avgEl.textContent=avg.toFixed(1)+' dBm';
  avgEl.style.color=rssiColor(avg);
  tick++;tickEl.textContent=tick;

  frameCount++;
  if(frameCount%8===0)renderPanel();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
})();
</script>
